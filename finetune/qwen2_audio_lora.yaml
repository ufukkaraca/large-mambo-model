# LLaMA-Factory LoRA config — Qwen2-Audio-7B-Instruct -> mambo.utterance.v1 (R3).
# Paths are the Modal volume mount points (see finetune/modal_app.py).
### model
model_name_or_path: Qwen/Qwen2-Audio-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: mambomix
dataset_dir: /data/dataset        # holds dataset_info.json + mambomix_train.json
template: qwen2_audio
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
media_dir: /data                  # audio paths in the json are /data/audio/<id>.wav

### output
output_dir: /output/mambo-qwen2audio-lora
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true
